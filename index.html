<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sayang's Letter</title>
<link href="https://fonts.googleapis.com/css2?family=Gloria+Hallelujah&display=swap" rel="stylesheet">

<style>
* { font-family: 'Gloria Hallelujah', cursive; }

body {
  background: white;
  margin: 0;
  text-align: center;
  overflow-x: hidden;
}

.screen1 { margin-top: 120px; }

.title-box {
  display: inline-block;
  padding: 12px 20px;
  border: 2px solid #d9534f;
  color: #d9534f;
  border-radius: 6px;
  box-shadow: 0 0 15px #ff9aa2;
  margin-bottom: 20px;
}

.choice-btn, button {
  padding: 12px 25px;
  margin: 10px;
  border: 2px solid #d9534f;
  background: transparent;
  color: #d9534f;
  border-radius: 6px;
  cursor: pointer;
  box-shadow: 0 0 15px #ff9aa2;
  transition: 0.3s;
  font-family: 'Gloria Hallelujah', cursive;
}

.choice-btn:hover, button:hover {
  box-shadow: 0 0 30px #ff6f91;
  background: #d9534f;
  color: white;
}

#envelope {
  display: none;
  position: relative;
  width: 280px;
  height: 180px;
  margin: 80px auto;
  background-color: #d9534f;
  border-radius: 6px;
  box-shadow: 0 0 30px #ff6f91;
}

.front { position: absolute; }

.flap {
  border-left: 140px solid transparent;
  border-right: 140px solid transparent;
  border-bottom: 82px solid transparent;
  border-top: 98px solid #d9534f;
}

.pocket {
  border-left: 140px solid #f5a3a2;
  border-right: 140px solid #f5a3a2;
  border-bottom: 90px solid #ff6f61;
  border-top: 90px solid transparent;
}

/* HEART */
.heart-beat {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 20px;
  height: 20px;
  transform: translate(-50%, -50%) rotate(-45deg);
  background: red;
  animation: beat 1s infinite;
}

.heart-beat::before,
.heart-beat::after {
  content: "";
  position: absolute;
  width: 20px;
  height: 20px;
  background: red;
  border-radius: 50%;
}

.heart-beat::before { top: -10px; left: 0; }
.heart-beat::after { left: 10px; top: 0; }

@keyframes beat {
  0%,100% { transform: translate(-50%, -50%) rotate(-45deg) scale(1); }
  50% { transform: translate(-50%, -50%) rotate(-45deg) scale(1.2); }
}

/* LETTER */
.letter {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: calc(100vh - 80px); /* leave space for close button */
  overflow-y: auto;
  padding: 50px 25px 20px 40px; /* add left padding for indentation */
  font-size: 18px;
  line-height: 1.7;
  color: #ff6f91;
  text-align: left;

  transform: scaleY(0);
  transform-origin: top;
  transition: transform 0.9s ease, opacity 0.6s;
  opacity: 0;

  background:
    radial-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
    linear-gradient(#fff, #fff);
  background-size: 4px 4px, 100% 100%;

  box-shadow: inset 0 0 80px rgba(255,105,135,0.6);
}

.letter p { margin-bottom: 1em; } /* one space per paragraph */

.open .letter {
  transform: scaleY(1);
  opacity: 1;
  animation: unfoldShadow 0.9s ease;
}

@keyframes unfoldShadow {
  0% { box-shadow: inset 0 -80px 120px rgba(0,0,0,0.2); }
  100% { box-shadow: inset 0 0 80px rgba(255,105,135,0.6); }
}

/* BUTTONS */
.buttons {
  display: none;
  position: fixed;
  bottom: 20px;
  width: 100%;
  text-align: center;
}

#letterButton {
  padding: 8px 20px;
  border-radius: 6px;
  font-size: 16px;
  border: 2px solid #d9534f;
  background: transparent;
  color: #d9534f;
  box-shadow: 0 0 15px #ff9aa2;
  cursor: pointer;
  font-family: 'Gloria Hallelujah', cursive;
}

#letterButton:hover {
  background: #d9534f;
  color: white;
  box-shadow: 0 0 30px #ff6f91;
}

/* SPARKLES */
.sparkle {
  position: fixed;
  font-size: 14px;
  color: pink;
  pointer-events: none;
  animation: sparkle 1s linear forwards;
}

@keyframes sparkle {
  0% { opacity: 1; transform: scale(1); }
  100% { opacity: 0; transform: scale(0.3) translateY(-20px); }
}
</style>
</head>

<body>

<div class="screen1" id="screen1">
  <div class="title-box">WILL YOU READ IT?</div><br>
  <button class="choice-btn" onclick="start()">YES</button>
  <button class="choice-btn" onclick="start()">YES</button>
</div>

<div id="envelope">
  <div class="heart-beat"></div>
  <div class="front flap"></div>
  <div class="front pocket"></div>
</div>

<div class="letter" id="letter">
  <p id="typedText"></p>
</div>

<div class="buttons" id="buttons">
  <button id="letterButton" onclick="toggleLetter()">OPEN</button>
</div>

<script>
const fullText = `hey alessi,

a chapter of your life has officially ended, and a new one is just about to begin. i wanted to write this letter not just to congratulate you, but to say the things i couldn’t before, especially after not keeping the promise i made back in december during our christmas party when i said i’d be there for your graduation. i’m really sorry for that.

i want you to know how proud i am of you. you’ve grown so much, and the way you keep pushing yourself to improve amazes me every single time. it’s okay to make mistakes—everyone does. what matters is that you learn from them and keep going. don’t ever let anyone or anything make you doubt your worth. you are important, and the way you care for others shows just how big your heart is. even the smallest kindness you share can change someone’s day—or even their life. that’s something rare, and it’s a part of you i hope you never lose.

i also hope, sayang, that you’re proud of yourself too. i hope you can look back and see how far you’ve come—the achievements you’ve worked for, the challenges you’ve faced, and the person you’ve become. you’ve improved in so many ways, even if it doesn’t always feel like it, and you deserve to celebrate yourself and all that you’ve accomplished. sometimes we’re so focused on what’s next that we forget to give ourselves credit, but you really should—you’re amazing for everything you’ve done and everything you are.

and while you’re at it, make sure to take care of yourself. don’t write so much that your hand or fingers go numb. eat well, don’t skip meals, and drink enough water. rest when you need to. be a good daughter, and a good role model and sister to both noah and miggy. you have a lot of people who look up to you, and the way you carry yourself matters more than you know.

i also want to acknowledge everything you’ve had to go through to get here. life hasn’t been easy, and there’s still more ahead, but look at how far you’ve come. “malayo pa, pero malayo na,” right? keep going. work hard, but don’t forget to rest. as long as you’re giving your best, that’s enough, and we will always be proud of you.

i know leaving your friends behind is hard, and it’s okay to feel that way. but sometimes life asks us to move forward and try new things. you can’t open new doors with old keys. this is your chance to meet new people, try new experiences, and discover sides of yourself you haven’t seen yet. beginnings can be scary, but they’re also exciting—and they matter.

i hope this new school year brings you so much happiness, peace, and good memories. bad days will happen, but they won’t last forever. after every storm, there’s always sunshine and rainbows waiting. what matters is how you face them and keep moving forward. i hope you meet people who make you smile, who accept you for who you are, and who bring out the best in you. i hope life treats you well, and i hope all your efforts pay off.

i know your relationship with your dad has been complicated, and it hasn’t been fair. it’s okay to feel hurt, frustrated, or even angry that he wasn’t there when you needed him. missing him doesn’t make you weak—it shows just how human and sensitive you are. i know sometimes it feels like hope is slipping away, like you might never get the chance to see him again or tell him the things you’ve been silently carrying all this time. i want you to hold on to that hope, sayang. even if it feels far away, the fact that you’ve been praying and wishing shows your heart is strong, and that hope itself is powerful. your past doesn’t define your future, and the challenges you’ve faced don’t take away from the incredible person you are today. you have the strength to create love, joy, and peace in your life, even if he cannot be there, and one day, maybe, things will change in ways you can’t imagine now. don’t give up on yourself, on your heart, or on your hope.

whenever you feel tired or overwhelmed, remember you’re never alone. we’re here for you. your efforts are never wasted, and they matter more than you know. thank you for always trying, even when it’s hard.

life is short, and we only get to live it once. live it fully. take chances, make memories, chase what makes you happy, and don’t hold yourself back. be brave enough to choose yourself and the life you want. you deserve to experience all the good things this world has to offer.

also, advance happy birthday, sayang! i hope this year brings you laughter, love, and everything you’ve been wishing for. i hope it’s full of new adventures, good friends, and unforgettable memories. you deserve every good thing life has to offer.

i am, and will always be, in all ways, with my whole soul and being, so proud of you, sayang. :)`;

let words = fullText.split(" ");
let index = 0;

// subtle typing sound
const audio = new Audio("https://www.soundjay.com/mechanical/typewriter-key-1.mp3");
audio.volume = 0.1;

// optional subtle heartbeat sound
const heartbeat = new Audio("https://www.soundjay.com/human/heartbeat-1.mp3");
heartbeat.volume = 0.1;
heartbeat.loop = true;

function typeEffect() {
  const el = document.getElementById("typedText");
  el.innerHTML = "";
  index = 0;

  let interval = setInterval(() => {
    if (index < words.length) {
      el.innerHTML += words[index] + " ";
      audio.currentTime = 0;
      audio.play();
      index++;
    } else {
      clearInterval(interval);
      heartbeat.pause();
    }
  }, 90);
}

function start() {
  document.getElementById('screen1').style.display = 'none';
  document.getElementById('envelope').style.display = 'block';
  document.getElementById('buttons').style.display = 'block';
}

function toggleLetter() {
  const btn = document.getElementById('letterButton');
  if (!document.body.classList.contains('open')) {
    document.body.classList.add('open');
    btn.innerText = "CLOSE";

    setTimeout(() => {
      document.getElementById('envelope').style.display = 'none';
      heartbeat.currentTime = 0;
      heartbeat.play();
      typeEffect();
    }, 300);

    createSparkles();
  } else {
    document.body.classList.remove('open');
    btn.innerText = "OPEN";
    document.getElementById('envelope').style.display = 'block';
    heartbeat.pause();
  }
}

/* SPARKLE TRAIL (MOBILE + PC) */
function createSparkles(x = window.innerWidth/2, y = window.innerHeight/2) {
  for (let i = 0; i < 20; i++) {
    let s = document.createElement('div');
    s.className = 'sparkle';
    s.innerHTML = '✦';
    s.style.left = (x + Math.random()*50-25) + 'px';
    s.style.top = (y + Math.random()*50-25) + 'px';
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),1000);
  }
}

window.addEventListener('touchmove', e => {
  let t = e.touches[0];
  createSparkles(t.clientX, t.clientY);
});

window.addEventListener('mousemove', e => {
  createSparkles(e.clientX, e.clientY);
});
</script>

</body>
</html>
